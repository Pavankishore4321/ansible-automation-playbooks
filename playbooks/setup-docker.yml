---
# ─────────────────────────────────────────────────────────────────────────────
# Playbook: Install and Configure Docker on Ubuntu/CentOS Servers
# Project:  AspTax containerization, general Docker server setup (Incresol)
# Usage:    ansible-playbook playbooks/setup-docker.yml
# ─────────────────────────────────────────────────────────────────────────────

- name: Install Docker on Linux Servers
  hosts: all
  become: yes

  vars:
    docker_users:
      - ubuntu       # add your Linux username here
    docker_compose_version: "2.24.0"

  tasks:

    - name: Remove old Docker versions if present
      apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent
      ignore_errors: yes

    - name: Install required dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add users to docker group (no sudo needed)
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop: "{{ docker_users }}"

    - name: Install Docker Compose standalone
      get_url:
        url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Verify Docker installation
      command: docker --version
      register: docker_version
      changed_when: false

    - name: Verify Docker Compose installation
      command: docker-compose --version
      register: compose_version
      changed_when: false

    - name: Show installed versions
      debug:
        msg:
          - "Docker: {{ docker_version.stdout }}"
          - "Docker Compose: {{ compose_version.stdout }}"

    - name: Run Docker hello-world test
      command: docker run --rm hello-world
      register: docker_test
      changed_when: false

    - name: Confirm Docker is working
      debug:
        msg: "Docker is installed and working correctly."
