---
# ─────────────────────────────────────────────────────────────────────────────
# Playbook: Install and Configure Nginx as Reverse Proxy / Load Balancer
# Project:  AspTax, Node App High-Availability (Incresol Software Services)
# Usage:    ansible-playbook playbooks/setup-nginx.yml
# ─────────────────────────────────────────────────────────────────────────────

- name: Install and Configure Nginx
  hosts: webservers
  become: yes

  vars:
    server_name: "your-domain.com"
    app_port: 3000
    ssl_enabled: false
    nginx_worker_processes: "auto"
    nginx_worker_connections: 1024

  tasks:

    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Ensure Nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Allow Nginx through UFW firewall
      ufw:
        rule: allow
        name: "Nginx Full"
      ignore_errors: yes

    - name: Deploy Nginx reverse proxy configuration
      template:
        src: ../roles/webserver/templates/nginx-reverse-proxy.conf.j2
        dest: /etc/nginx/sites-available/{{ server_name }}
        mode: '0644'
      notify: Reload Nginx

    - name: Enable the site
      file:
        src: /etc/nginx/sites-available/{{ server_name }}
        dest: /etc/nginx/sites-enabled/{{ server_name }}
        state: link
      notify: Reload Nginx

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx

    - name: Test Nginx configuration
      command: nginx -t
      changed_when: false

    - name: Create Nginx log directory
      file:
        path: /var/log/nginx
        state: directory
        owner: www-data
        group: adm
        mode: '0755'

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded
