---
# ─────────────────────────────────────────────────────────────────────────────
# Playbook: Initial Linux Server Setup & Hardening
# Project:  On-Premises Server Maintenance, IDigiPro (Incresol)
# Supports: Ubuntu 20.04 / 22.04, CentOS 7/8, RHEL 8
# Usage:    ansible-playbook playbooks/initial-server-setup.yml
# ─────────────────────────────────────────────────────────────────────────────

- name: Initial Linux Server Setup
  hosts: all
  become: yes

  vars:
    new_user: "devops"
    ssh_port: 22
    allowed_ssh_users:
      - devops
    timezone: "Asia/Kolkata"
    ntp_servers:
      - "0.pool.ntp.org"
      - "1.pool.ntp.org"

  tasks:

    # ── SYSTEM UPDATE ─────────────────────────────────────────────────────────
    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Upgrade all packages
      apt:
        upgrade: dist
      when: ansible_os_family == "Debian"

    # ── CREATE DEVOPS USER ────────────────────────────────────────────────────
    - name: Create devops user
      user:
        name: "{{ new_user }}"
        shell: /bin/bash
        create_home: yes
        groups: sudo
        append: yes

    - name: Set up SSH authorized key for devops user
      authorized_key:
        user: "{{ new_user }}"
        key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
        state: present

    - name: Allow devops user passwordless sudo
      lineinfile:
        path: /etc/sudoers
        line: "{{ new_user }} ALL=(ALL) NOPASSWD:ALL"
        validate: 'visudo -cf %s'

    # ── SSH HARDENING ─────────────────────────────────────────────────────────
    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart SSH

    - name: Disable password authentication (key only)
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: Restart SSH

    - name: Allow only specific users via SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        line: "AllowUsers {{ allowed_ssh_users | join(' ') }}"
      notify: Restart SSH

    # ── FIREWALL SETUP (UFW) ──────────────────────────────────────────────────
    - name: Install UFW
      apt:
        name: ufw
        state: present

    - name: Set UFW default deny incoming
      ufw:
        default: deny
        direction: incoming

    - name: Set UFW default allow outgoing
      ufw:
        default: allow
        direction: outgoing

    - name: Allow SSH
      ufw:
        rule: allow
        port: "{{ ssh_port }}"
        proto: tcp

    - name: Allow HTTP
      ufw:
        rule: allow
        port: 80
        proto: tcp

    - name: Allow HTTPS
      ufw:
        rule: allow
        port: 443
        proto: tcp

    - name: Enable UFW
      ufw:
        state: enabled

    # ── TIMEZONE & NTP ────────────────────────────────────────────────────────
    - name: Set system timezone
      timezone:
        name: "{{ timezone }}"

    - name: Install NTP
      apt:
        name: ntp
        state: present

    - name: Start and enable NTP
      service:
        name: ntp
        state: started
        enabled: yes

    # ── INSTALL ESSENTIAL TOOLS ───────────────────────────────────────────────
    - name: Install essential packages
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - net-tools
          - unzip
          - tar
          - logrotate
          - fail2ban
        state: present

    - name: Start and enable fail2ban
      service:
        name: fail2ban
        state: started
        enabled: yes

    # ── LOG ROTATION ──────────────────────────────────────────────────────────
    - name: Configure log rotation for app logs
      copy:
        dest: /etc/logrotate.d/app-logs
        content: |
          /var/log/app/*.log {
              daily
              missingok
              rotate 14
              compress
              delaycompress
              notifempty
              create 0640 www-data adm
          }

  handlers:
    - name: Restart SSH
      service:
        name: sshd
        state: restarted
