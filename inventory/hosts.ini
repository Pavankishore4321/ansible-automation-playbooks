# ─────────────────────────────────────────────────────────────────────────────
# Ansible Inventory File
# Replace IP addresses with your actual server IPs before use
# ─────────────────────────────────────────────────────────────────────────────

# Web/Nginx servers — Angular frontend (AspTax, P-Collab)
[webservers]
web-server-1 ansible_host=10.0.1.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa
web-server-2 ansible_host=10.0.1.11 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

# Application servers — Spring Boot / Tomcat (multi-client projects)
[appservers]
app-server-1 ansible_host=10.0.2.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa
app-server-2 ansible_host=10.0.2.11 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

# MongoDB nodes — Replica Set (Node app HA project)
[mongodb_nodes]
mongo-primary   ansible_host=10.0.3.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa
mongo-secondary ansible_host=10.0.3.11 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa
mongo-arbiter   ansible_host=10.0.3.12 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

# MongoDB primary only (for replica set initiation)
[mongodb_primary]
mongo-primary ansible_host=10.0.3.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

# All servers group
[all:vars]
ansible_python_interpreter=/usr/bin/python3
